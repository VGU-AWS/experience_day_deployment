name: Deploy to Amazon SageMaker Endpoint

on:
  push:
    branches: ["main","sagemaker"]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: experienceday/vrapp
  SAGEMAKER_MODEL_NAME: experienceday-vrapp-model
  SAGEMAKER_ENDPOINT_CONFIG_NAME: experienceday-vrapp-endpoint-config
  SAGEMAKER_ENDPOINT_NAME: experienceday-vrapp-endpoint
  SAGEMAKER_EXECUTION_ROLE_ARN: ${{ secrets.SAGEMAKER_EXECUTION_ROLE_ARN }}
  SAGEMAKER_INSTANCE_TYPE: ml.g4dn.xlarge
  SAGEMAKER_INSTANCE_COUNT: '1'


permissions:
  contents: read

jobs:
  deploy:
    name: Build image and deploy to SageMaker
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Create SageMaker model and endpoint config
        id: create-endpoint-config
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
        run: |
          set -euo pipefail
          TIMESTAMP="$(date +%Y%m%d%H%M%S)"
          MODEL_NAME="${SAGEMAKER_MODEL_NAME}-${TIMESTAMP}"
          ENDPOINT_CONFIG_NAME="${SAGEMAKER_ENDPOINT_CONFIG_NAME}-${TIMESTAMP}"

          aws sagemaker create-model \
            --model-name "$MODEL_NAME" \
            --execution-role-arn "$SAGEMAKER_EXECUTION_ROLE_ARN" \
            --primary-container Image="$IMAGE_URI" \
            --region "$AWS_REGION"

          aws sagemaker create-endpoint-config \
            --endpoint-config-name "$ENDPOINT_CONFIG_NAME" \
            --production-variants "VariantName=AllTraffic,ModelName=$MODEL_NAME,InitialInstanceCount=$SAGEMAKER_INSTANCE_COUNT,InstanceType=$SAGEMAKER_INSTANCE_TYPE,InitialVariantWeight=1.0" \
            --region "$AWS_REGION"

          echo "endpoint_config_name=$ENDPOINT_CONFIG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create or update SageMaker endpoint
        env:
          ENDPOINT_CONFIG_NAME: ${{ steps.create-endpoint-config.outputs.endpoint_config_name }}
        run: |
          set -euo pipefail

          if aws sagemaker describe-endpoint --endpoint-name "$SAGEMAKER_ENDPOINT_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Updating existing endpoint: $SAGEMAKER_ENDPOINT_NAME"
            aws sagemaker update-endpoint \
              --endpoint-name "$SAGEMAKER_ENDPOINT_NAME" \
              --endpoint-config-name "$ENDPOINT_CONFIG_NAME" \
              --region "$AWS_REGION"
          else
            echo "Creating new endpoint: $SAGEMAKER_ENDPOINT_NAME"
            aws sagemaker create-endpoint \
              --endpoint-name "$SAGEMAKER_ENDPOINT_NAME" \
              --endpoint-config-name "$ENDPOINT_CONFIG_NAME" \
              --region "$AWS_REGION"
          fi

          aws sagemaker wait endpoint-in-service \
            --endpoint-name "$SAGEMAKER_ENDPOINT_NAME" \
            --region "$AWS_REGION"
